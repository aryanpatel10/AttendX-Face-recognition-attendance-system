<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaceAttend — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">👁</div>
      <h1>FaceAttend</h1>
      <p>Facial Recognition Attendance System</p>
    </div>

    <div class="card card-body">
      <h2 style="margin-bottom:20px">Sign in to your account</h2>

      <div class="form-group">
        <label>Email address</label>
        <div class="input-group">
          <span class="input-icon">✉</span>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary w-full" style="padding:10px" onclick="doLogin()">Sign in</button>

      <p class="text-sm text-muted" style="text-align:center;margin-top:20px">
        Need an account? <a href="/register">Register here</a>
      </p>
    </div>

    <div class="card card-body" style="margin-top:12px;background:#f8fafc;">
      <p class="text-sm text-muted" style="margin-bottom:8px;font-weight:600">Demo credentials</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="fillDemo('admin@demo.com','admin123')">Admin</button>
        <button class="btn btn-secondary btn-sm" onclick="fillDemo('teacher@demo.com','teacher123')">Teacher</button>
        <button class="btn btn-secondary btn-sm" onclick="fillDemo('rahul@demo.com','student123')">Student</button>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) window.location.href = '/dashboard';

  function fillDemo(email, pw) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = pw;
  }

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showToast('Please enter email and password', 'error'); return; }
    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });
      setAuth(data.access_token, data.user);
      showToast(`Welcome, ${data.user.full_name}!`, 'success');
      setTimeout(() => window.location.href = '/dashboard', 600);
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  // Enter key submits
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
