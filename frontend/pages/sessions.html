<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaceAttend — Sessions</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="page-header">
      <h1>Sessions</h1>
      <p>View past and active attendance sessions</p>
    </div>
    <div class="page-body">
      <div class="grid-2" style="align-items:start">

        <!-- Sessions list -->
        <div>
          <div class="card">
            <div class="card-header">Recent Sessions</div>
            <div id="sessions-list" style="padding:4px 0">
              <p class="text-muted" style="padding:24px;text-align:center">Loading...</p>
            </div>
          </div>
        </div>

        <!-- Session detail -->
        <div>
          <div class="card" id="detail-panel">
            <div class="card-header">Session Detail</div>
            <div class="card-body" id="detail-body">
              <div class="empty-state">
                <div class="icon">📋</div>
                <p>Click a session to view its summary</p>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
renderLayout('sessions');

async function loadSessions() {
  try {
    const sessions = await apiFetch('/attendance/sessions');
    const list = document.getElementById('sessions-list');
    if (!sessions.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>No sessions yet</p></div>`;
      return;
    }
    list.innerHTML = sessions.map(s => `
      <div onclick="loadDetail(${s.id})" style="padding:14px 20px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s"
           onmouseenter="this.style.background='#f8fafc'" onmouseleave="this.style.background=''">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-weight:600;font-size:.9rem">${s.subject_name}</span>
          <span class="badge ${s.is_active ? 'badge-present' : 'badge-pending'}">${s.is_active ? '● Active' : 'Ended'}</span>
        </div>
        <div class="text-muted text-sm">
          <span>${s.subject_code}</span> · <span>${s.date}</span> · <span>${s.start_time.slice(0,5)}</span>
        </div>
        <div class="text-muted" style="font-size:.72rem;margin-top:2px">Teacher: ${s.teacher_name}</div>
      </div>`).join('');
  } catch (e) {
    showToast('Failed to load sessions: ' + e.message, 'error');
  }
}

async function loadDetail(sessionId) {
  const body = document.getElementById('detail-body');
  body.innerHTML = '<p class="text-muted" style="text-align:center;padding:24px">Loading...</p>';
  try {
    const d = await apiFetch(`/attendance/sessions/${sessionId}/summary`);
    const pct = d.percentage;
    const barColor = pct >= 75 ? 'green' : pct >= 50 ? 'amber' : 'red';

    body.innerHTML = `
      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span class="text-sm">Attendance Rate</span>
          <span style="font-weight:700;font-size:1.1rem">${pct}%</span>
        </div>
        <div class="progress"><div class="progress-bar ${barColor}" style="width:${pct}%"></div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px">
        <div style="text-align:center;padding:12px;background:#f0fdf4;border-radius:8px">
          <div style="font-size:1.5rem;font-weight:700;color:#16a34a">${d.present_count}</div>
          <div style="font-size:.72rem;color:#16a34a">Present</div>
        </div>
        <div style="text-align:center;padding:12px;background:#fef2f2;border-radius:8px">
          <div style="font-size:1.5rem;font-weight:700;color:#dc2626">${d.absent_count}</div>
          <div style="font-size:.72rem;color:#dc2626">Absent</div>
        </div>
        <div style="text-align:center;padding:12px;background:#f8fafc;border-radius:8px">
          <div style="font-size:1.5rem;font-weight:700;color:#475569">${d.total}</div>
          <div style="font-size:.72rem;color:#475569">Total</div>
        </div>
      </div>

      <p style="font-size:.75rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Present Students</p>
      <div style="display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;margin-bottom:14px">
        ${d.present.length ? d.present.map(p => `
          <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f0fdf4;border-radius:7px;font-size:.83rem">
            <span style="color:#16a34a">✓</span>
            <span style="flex:1;font-weight:500">${p.full_name}</span>
            <span style="font-size:.72rem;color:#16a34a">${p.student_id}</span>
            ${p.recognition_confidence ? `<span style="font-size:.72rem;color:#16a34a;font-weight:700">${p.recognition_confidence.toFixed(1)}%</span>` : ''}
          </div>`).join('') : '<p class="text-muted text-sm" style="text-align:center;padding:8px">None</p>'}
      </div>

      ${d.absent.length ? `
      <p style="font-size:.75rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Absent Students</p>
      <div style="display:flex;flex-direction:column;gap:4px;max-height:150px;overflow-y:auto">
        ${d.absent.map(a => `
          <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#fef2f2;border-radius:7px;font-size:.83rem">
            <span style="color:#dc2626">✕</span>
            <span>${a.full_name}</span>
            <span style="margin-left:auto;font-size:.72rem;color:#94a3b8">${a.student_id}</span>
          </div>`).join('')}
      </div>` : ''}`;
  } catch (e) {
    body.innerHTML = `<p class="text-muted" style="padding:24px;text-align:center">Failed: ${e.message}</p>`;
  }
}

loadSessions();
</script>
</body>
</html>
