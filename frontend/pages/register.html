<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaceAttend — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">👁</div>
      <h1>FaceAttend</h1>
      <p>Create your account</p>
    </div>
    <div class="card card-body">
      <h2 style="margin-bottom:20px">Register</h2>
      <div class="form-group">
        <label>Full Name</label>
        <input id="name" placeholder="Your full name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="Min 6 characters" />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="role">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button class="btn btn-primary w-full" style="padding:10px;margin-top:6px" onclick="doRegister()">Create Account</button>
      <p class="text-sm text-muted" style="text-align:center;margin-top:16px">
        Already have an account? <a href="/login">Sign in</a>
      </p>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
if (isLoggedIn()) window.location.href = '/dashboard';

async function doRegister() {
  const payload = {
    full_name: document.getElementById('name').value.trim(),
    email:     document.getElementById('email').value.trim(),
    password:  document.getElementById('password').value,
    role:      document.getElementById('role').value,
  };
  if (!payload.full_name || !payload.email || !payload.password) {
    showToast('All fields are required', 'error'); return;
  }
  try {
    const data = await apiFetch('/auth/register', { method:'POST', body: JSON.stringify(payload) });
    setAuth(data.access_token, data.user);
    showToast('Account created!', 'success');
    setTimeout(() => window.location.href = '/dashboard', 700);
  } catch (e) { showToast(e.message, 'error'); }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
